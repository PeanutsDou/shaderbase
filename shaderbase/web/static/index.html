<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>shaderbase 知识图谱</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; background: #1a1a2e; color: #e0e0e0; display: flex; height: 100vh; overflow: hidden; }

/* 左侧面板 */
#sidebar { width: 280px; background: #16213e; border-right: 1px solid #0f3460; display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
#sidebar h1 { padding: 16px; font-size: 18px; color: #e94560; border-bottom: 1px solid #0f3460; }
#sidebar .section { padding: 12px 16px; border-bottom: 1px solid #0f3460; }
#sidebar .section h3 { font-size: 13px; color: #a0a0c0; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
#search-box { width: 100%; padding: 8px 12px; background: #1a1a2e; border: 1px solid #0f3460; border-radius: 4px; color: #e0e0e0; font-size: 14px; }
#search-box:focus { outline: none; border-color: #e94560; }
#kind-filter { display: flex; flex-wrap: wrap; gap: 4px; }
#kind-filter label { display: flex; align-items: center; gap: 4px; font-size: 12px; cursor: pointer; padding: 2px 6px; border-radius: 3px; background: #1a1a2e; }
#kind-filter input { margin: 0; }
.stat-row { display: flex; justify-content: space-between; font-size: 13px; padding: 2px 0; }
.stat-row .num { color: #e94560; font-weight: bold; }

/* 中间画布 */
#main { flex: 1; display: flex; flex-direction: column; position: relative; }
#cy { flex: 1; background: #0f0f23; }
#toolbar { position: absolute; top: 8px; left: 8px; z-index: 10; display: flex; gap: 8px; }
#toolbar button { padding: 6px 12px; background: #16213e; border: 1px solid #0f3460; border-radius: 4px; color: #e0e0e0; cursor: pointer; font-size: 13px; }
#toolbar button:hover { background: #0f3460; }
#toolbar input { padding: 6px 10px; background: #16213e; border: 1px solid #0f3460; border-radius: 4px; color: #e0e0e0; font-size: 13px; width: 200px; }
#status-bar { position: absolute; bottom: 8px; left: 8px; z-index: 10; font-size: 12px; color: #606080; background: rgba(22,33,62,0.8); padding: 4px 8px; border-radius: 3px; }

/* 右侧详情面板 */
#detail-panel { width: 360px; background: #16213e; border-left: 1px solid #0f3460; overflow-y: auto; flex-shrink: 0; display: none; }
#detail-panel.active { display: block; }
#detail-panel .header { padding: 16px; border-bottom: 1px solid #0f3460; position: sticky; top: 0; background: #16213e; z-index: 1; }
#detail-panel .header .kind-badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 12px; font-weight: bold; margin-bottom: 4px; }
#detail-panel .header h2 { font-size: 18px; color: #e94560; }
#detail-panel .header .file-line { font-size: 12px; color: #808090; margin-top: 4px; }
#detail-panel .header .cond-sig { font-size: 11px; color: #e94560; margin-top: 4px; font-family: monospace; }
#detail-panel .body { padding: 16px; }
#detail-panel .section { margin-bottom: 16px; }
#detail-panel .section h4 { font-size: 13px; color: #a0a0c0; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
#detail-panel .section .conn-item { padding: 4px 0; font-size: 13px; cursor: pointer; border-bottom: 1px solid rgba(15,52,96,0.3); }
#detail-panel .section .conn-item:hover { color: #e94560; }
#detail-panel .section .conn-item .arrow { color: #606080; margin: 0 4px; }
#detail-panel .section .conn-item .sig { font-size: 10px; color: #e94560; font-family: monospace; }
#detail-panel .props { font-family: "Consolas", monospace; font-size: 12px; white-space: pre-wrap; word-break: break-all; background: #1a1a2e; padding: 8px; border-radius: 4px; max-height: 300px; overflow-y: auto; }
#detail-panel .source { font-family: "Consolas", monospace; font-size: 12px; white-space: pre; background: #1a1a2e; padding: 8px; border-radius: 4px; max-height: 400px; overflow: auto; color: #c0c0d0; }
#detail-panel .source .highlight { background: #e9456030; }
#detail-panel button { padding: 4px 10px; background: #0f3460; border: 1px solid #1a1a2e; border-radius: 3px; color: #e0e0e0; cursor: pointer; font-size: 12px; margin-top: 4px; }
#detail-panel button:hover { background: #e94560; }
</style>
</head>
<body>

<div id="sidebar">
  <h1>shaderbase 图谱</h1>
  <div class="section">
    <h3>搜索</h3>
    <input type="text" id="search-box" placeholder="函数名/结构名...">
  </div>
  <div class="section">
    <h3>调用链</h3>
    <input type="text" id="trace-box" placeholder="函数名 + 回车">
  </div>
  <div class="section">
    <h3>类型过滤</h3>
    <div id="kind-filter"></div>
  </div>
  <div class="section">
    <h3>概览</h3>
    <div id="stats"></div>
  </div>
</div>

<div id="main">
  <div id="toolbar">
    <input type="text" id="file-filter" placeholder="文件路径过滤...">
    <button onclick="resetGraph()">清空</button>
    <button onclick="fitGraph()">适应</button>
  </div>
  <div id="cy"></div>
  <div id="status-bar"></div>
</div>

<div id="detail-panel">
  <div class="header" id="detail-header"></div>
  <div class="body" id="detail-body"></div>
</div>

<script src="/static/cytoscape.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
