<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>shaderbase 知识图谱</title>
<style>
:root {
  --bg: #06090f;
  --bg-panel: #0b1920;
  --bg-panel-2: #0d1117;
  --bg-elev: #161b22;
  --border: #21262d;
  --border-soft: rgba(33, 38, 45, 0.6);
  --fg: #e6edf3;
  --fg-dim: #8b949e;
  --fg-mute: rgba(230, 237, 243, 0.4);
  --primary: #1DA27E;
  --primary-soft: rgba(29, 162, 126, 0.15);
  --accent: #1C8585;
  --danger: #e05252;
  --warn: #f0b429;
  --cyan: #06b6d4;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
  background: var(--bg);
  color: var(--fg);
  display: flex;
  flex-direction: column;
  font-size: 13px;
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; cursor: pointer; }
input, button { outline: none; }

/* ── Header ─────────────────────────────────────────── */
#header {
  height: 48px; flex-shrink: 0;
  background: rgba(11, 25, 32, 0.8);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; gap: 24px;
}
#header .brand { display: flex; align-items: center; gap: 10px; }
#header .brand-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--primary); }
#header .brand-text { font-size: 13px; font-weight: 600; color: var(--fg); letter-spacing: -0.01em; }
#header .project-pill {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 12px; border-radius: 8px;
  background: rgba(255,255,255,0.04); border: 1px solid var(--border-soft);
}
#header .project-pill .label { font-size: 10px; color: var(--fg-mute); text-transform: uppercase; letter-spacing: 0.05em; }
#header .project-pill .name { font-size: 11px; color: var(--primary); font-family: "JetBrains Mono", Consolas, monospace; }
#header .spacer { flex: 1; }
#header .actions { display: flex; align-items: center; gap: 8px; }

.hdr-btn {
  padding: 6px 12px; background: transparent;
  border: 1px solid var(--border-soft); border-radius: 6px;
  color: var(--fg); font-size: 12px; transition: all 0.15s;
}
.hdr-btn:hover { border-color: var(--primary); color: var(--primary); }
.hdr-btn.primary { background: var(--primary-soft); border-color: var(--primary-soft); color: var(--primary); }
.hdr-btn.primary:hover { background: rgba(29,162,126,0.25); }

.budget-wrap {
  display: flex; align-items: center; gap: 6px;
  height: 32px; padding: 0 8px;
  border-radius: 6px; border: 1px solid var(--border-soft);
  background: rgba(11,25,32,0.8); backdrop-filter: blur(8px);
}
.budget-wrap label {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-mute);
}
#budget-input {
  width: 80px; background: transparent; border: none;
  text-align: right; color: var(--cyan); font-family: "JetBrains Mono", Consolas, monospace;
  font-size: 12px;
}
#budget-input::-webkit-outer-spin-button, #budget-input::-webkit-inner-spin-button {
  -webkit-appearance: none; margin: 0;
}

/* ── Main 3-column layout ───────────────────────────── */
#main { flex: 1; display: flex; overflow: hidden; min-height: 0; }

/* Left panel */
#left-panel {
  width: 260px; flex-shrink: 0;
  background: rgba(11, 25, 32, 0.9);
  backdrop-filter: blur(12px);
  border-right: 1px solid var(--border-soft);
  display: flex; flex-direction: column; overflow: hidden;
}
.lp-section { border-bottom: 1px solid var(--border-soft); padding: 12px 16px; }
.lp-section-title {
  font-size: 11px; color: var(--fg-mute); text-transform: uppercase;
  letter-spacing: 0.1em; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
}
.lp-section-title .lp-actions { display: flex; gap: 6px; }
.lp-section-title .lp-actions a { font-size: 10px; color: var(--primary); cursor: pointer; }
.lp-section-title .lp-actions .sep { color: var(--fg-mute); }

/* Filter chips */
.filter-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 6px; margin: 2px 2px 0 0;
  border-radius: 6px; border: 1px solid transparent;
  background: transparent; color: var(--fg-dim);
  font-size: 10px; font-weight: 500; transition: all 0.15s;
}
.filter-chip.on { border-color: rgba(255,255,255,0.08); background: rgba(255,255,255,0.04); }
.filter-chip:not(.on) { opacity: 0.25; }
.filter-chip .fc-dot { width: 5px; height: 5px; border-radius: 50%; }
.filter-chip .fc-count { color: var(--fg-mute); font-variant-numeric: tabular-nums; }
.filter-chip.edge:not(.on) { color: rgba(230,237,243,0.3); }

/* Dead-code section */
.dead-section { padding: 12px 16px; border-top: 1px solid var(--border-soft); }
.dead-section .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.dead-section .row-label { font-size: 10px; color: var(--fg-mute); text-transform: uppercase; letter-spacing: 0.08em; }
.dead-section .row-val { font-size: 10px; color: rgba(239,68,68,0.8); font-variant-numeric: tabular-nums; }
.check-row {
  display: flex; align-items: center; gap: 6px; padding: 4px 0;
  background: transparent; border: none; width: 100%; text-align: left;
  font-size: 11px; color: var(--fg-dim);
}
.check-row.on { color: var(--primary); }
.check-box {
  width: 14px; height: 14px; border-radius: 3px;
  border: 1px solid var(--fg-mute); display: inline-flex; align-items: center; justify-content: center;
}
.check-row.on .check-box { border-color: var(--primary); background: var(--primary-soft); }
.check-row.on .check-box::after { content: "✓"; font-size: 9px; color: var(--primary); }
.legend-row {
  display: flex; flex-wrap: wrap; gap: 6px 8px; margin-top: 8px;
}
.legend-item { display: inline-flex; align-items: center; gap: 4px; font-size: 9px; color: var(--fg-mute); }
.legend-dot { width: 6px; height: 6px; border-radius: 50%; }

/* Show labels toggle */
.display-options { padding: 10px 16px; border-top: 1px solid var(--border-soft); }

/* File tree */
.file-tree-wrap { padding: 12px 0 8px; border-bottom: 1px solid var(--border-soft); }
.file-tree-wrap .lp-section-title { padding: 0 16px; margin-bottom: 8px; }
.search-box {
  margin: 0 12px 10px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  padding: 6px 12px;
  width: calc(100% - 24px);
  color: var(--fg); font-size: 12px;
  transition: all 0.15s;
}
.search-box:focus { border-color: rgba(29,162,126,0.4); background: rgba(255,255,255,0.06); }
.search-box::placeholder { color: var(--fg-mute); }
#file-tree {
  flex: 1; overflow-y: auto; overflow-x: hidden; padding: 4px 0;
  min-height: 0;
}
.tree-item {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 12px; font-size: 12px;
  color: rgba(230,237,243,0.6);
  cursor: pointer; white-space: nowrap; transition: background 0.1s;
}
.tree-item:hover { background: rgba(255,255,255,0.03); color: var(--fg); }
.tree-item .ti-arrow { width: 12px; color: var(--fg-mute); font-size: 10px; text-align: center; }
.tree-item .ti-name { flex: 1; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
.tree-item .ti-count { color: var(--fg-mute); font-size: 10px; font-variant-numeric: tabular-nums; }
.tree-leaf {
  display: flex; align-items: center; gap: 6px;
  padding: 3px 12px; width: 100%; text-align: left;
  background: transparent; border: none;
  font-size: 11px; color: rgba(230,237,243,0.4);
  cursor: pointer; transition: all 0.1s;
}
.tree-leaf:hover { background: rgba(255,255,255,0.02); color: var(--fg); }
.tree-leaf .ft-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.tree-leaf .ft-leaf-name { flex: 1; overflow: hidden; text-overflow: ellipsis; font-family: "JetBrains Mono", Consolas, monospace; }
.tree-leaf .ft-leaf-label { color: rgba(230,237,243,0.1); font-size: 10px; }
.ft-leaf {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 16px; width: 100%; text-align: left;
  background: transparent; border: none;
  font-size: 11px; cursor: pointer; transition: all 0.1s;
}
.ft-leaf:hover { background: rgba(255,255,255,0.03); }
.ft-leaf .ft-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.ft-leaf .ft-name { flex: 1; overflow: hidden; text-overflow: ellipsis; }
.ft-leaf .ft-path { color: var(--fg-mute); font-size: 10px; font-family: "JetBrains Mono", Consolas, monospace; max-width: 100px; overflow: hidden; text-overflow: ellipsis; }
.ft-empty { text-align: center; padding: 24px; color: var(--fg-mute); font-size: 12px; }
.clear-sel-wrap { padding: 8px 12px; border-top: 1px solid var(--border-soft); }
.clear-sel-btn {
  width: 100%; padding: 6px 12px; border-radius: 8px;
  background: rgba(255,255,255,0.04); border: none;
  color: var(--fg-mute); font-size: 11px; font-weight: 500;
  transition: all 0.15s;
}
.clear-sel-btn:hover { background: rgba(255,255,255,0.07); color: var(--fg); }

/* Resize handle */
.resize-handle {
  width: 4px; flex-shrink: 0; cursor: col-resize;
  background: transparent; transition: background 0.15s;
}
.resize-handle:hover, .resize-handle.dragging { background: rgba(29,162,126,0.3); }

/* Center canvas */
#center { flex: 1; position: relative; display: flex; flex-direction: column; min-width: 0; }
#canvas-container { flex: 1; position: relative; overflow: hidden; }
#canvas-container canvas { display: block; }

/* HUD */
#hud {
  position: absolute; top: 16px; left: 16px; z-index: 10;
  font-size: 11px; color: var(--fg-mute);
  font-family: "JetBrains Mono", Consolas, monospace;
  pointer-events: none;
}
#hud p { margin: 0; }
#hud .hud-filtered { color: rgba(230,237,243,0.25); margin-top: 2px; font-size: 10px; }
#hud .hud-notice { color: rgba(240,180,41,0.8); margin-top: 2px; font-size: 10px; }
#hud .hud-sel { color: rgba(6,182,212,0.5); margin-top: 2px; font-size: 10px; }

/* Top-right toolbar */
#toolbar-top {
  position: absolute; top: 16px; right: 16px; z-index: 10;
  display: flex; gap: 8px; align-items: center;
}

/* Loading overlay */
#loading {
  position: absolute; inset: 0; z-index: 20;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(6,9,15,0.7); backdrop-filter: blur(4px);
  color: var(--fg-dim);
}
.loader-svg { animation: pulse 2s ease-in-out infinite; }
@keyframes pulse {
  0%, 100% { opacity: 0.4; transform: scale(0.95); }
  50% { opacity: 1; transform: scale(1); }
}
.loader-edge { stroke: var(--primary); stroke-width: 1; opacity: 0.3; }
.loader-node { fill: var(--primary); }
.loading-text { font-size: 14px; color: var(--fg-dim); margin-top: 16px; }
.loading-sub { font-size: 11px; color: var(--cyan); font-family: "JetBrains Mono", Consolas, monospace; margin-top: 4px; min-height: 16px; }
#load-error {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  background: rgba(224,82,82,0.1); border: 1px solid rgba(224,82,82,0.3);
  color: rgba(239,107,107,0.9); padding: 16px 24px; border-radius: 8px;
  display: none; max-width: 400px; text-align: center;
}

/* Tooltip */
#tooltip {
  position: fixed; z-index: 30; pointer-events: none; display: none;
  background: rgba(26,26,46,0.95); backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
  padding: 8px 12px; font-size: 12px; max-width: 320px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
#tooltip .tt-name { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
#tooltip .tt-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
#tooltip .tt-dot.sm { width: 6px; height: 6px; }
#tooltip .tt-name-text { font-weight: 600; color: var(--fg); }
#tooltip .tt-label { color: var(--fg-mute); font-size: 11px; margin-left: 4px; }
#tooltip .tt-meta { color: var(--fg-dim); font-size: 11px; margin-top: 2px; font-family: "JetBrains Mono", Consolas, monospace; }
#tooltip .tt-status { display: flex; align-items: center; gap: 6px; margin-top: 4px; color: var(--fg-dim); font-size: 11px; }
#tooltip .tt-calls { color: var(--fg-mute); }
#tooltip .tt-hint { color: var(--primary); font-size: 10px; margin-top: 4px; }

/* Right detail panel */
#right-panel {
  width: 300px; flex-shrink: 0;
  background: rgba(11,25,32,0.95);
  backdrop-filter: blur(20px);
  border-left: 1px solid var(--border-soft);
  overflow: hidden; display: none;
  flex-direction: column; height: 100%;
}
#right-panel.active { display: flex; }

#detail-header { padding: 16px; border-bottom: 1px solid var(--border-soft); flex-shrink: 0; }
.dh-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
.dh-title-wrap { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; min-width: 0; }
.dh-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.dh-title-wrap h2 { font-size: 14px; color: var(--fg); font-weight: 600; }
.dh-badge { padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 500; }
.dh-close {
  background: transparent; border: none; color: var(--fg-mute);
  font-size: 18px; padding: 4px 8px; line-height: 1; transition: color 0.15s;
}
.dh-close:hover { color: var(--fg); }
.dh-path {
  font-size: 11px; color: var(--fg-dim); margin-top: 8px;
  font-family: "JetBrains Mono", Consolas, monospace;
  word-break: break-all; line-height: 1.5;
}
.dh-path .dh-line { color: rgba(230,237,243,0.45); }
.dh-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.dh-actions button {
  padding: 4px 10px; border-radius: 6px;
  background: var(--primary-soft); border: 1px solid transparent;
  color: var(--primary); font-size: 11px; font-weight: 500;
  transition: all 0.15s;
}
.dh-actions button:hover { background: rgba(29,162,126,0.25); }
.dh-git {
  padding: 4px 10px; border-radius: 6px;
  background: rgba(255,255,255,0.05); border: 1px solid transparent;
  color: var(--fg-dim); font-size: 11px; font-weight: 500;
  text-decoration: none; transition: all 0.15s;
}
.dh-git:hover { background: rgba(255,255,255,0.09); color: var(--fg); }

.dh-stats { display: flex; gap: 20px; margin-top: 12px; }
.dh-stat { display: flex; flex-direction: column; }
.dh-stat-label { font-size: 9px; color: var(--fg-mute); text-transform: uppercase; letter-spacing: 0.1em; }
.dh-stat-val { font-size: 18px; font-weight: 600; font-variant-numeric: tabular-nums; color: var(--fg); margin-top: 2px; }
.dh-stat-val.out { color: var(--primary); }
.dh-stat-val.in { color: var(--cyan); }

#detail-body { flex: 1; overflow-y: auto; padding: 12px 16px; min-height: 0; }
.detail-body-inner { display: flex; flex-direction: column; gap: 16px; }
.detail-section .ds-title {
  font-size: 11px; font-weight: 500; color: var(--fg-dim);
  margin-bottom: 8px;
}
.detail-section .ds-count { color: var(--fg-mute); }
.detail-section .ds-empty { font-size: 12px; color: var(--fg-mute); text-align: center; padding: 16px; }
.ds-group { margin-bottom: 8px; }
.ds-group-title {
  font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em;
  margin-bottom: 4px; font-weight: 500;
}
.ds-more { font-size: 10px; color: var(--fg-mute); padding: 4px 8px; }
.conn-item {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 8px; border-radius: 6px;
  font-size: 11px; cursor: pointer; transition: background 0.1s;
}
.conn-item:hover { background: rgba(255,255,255,0.04); }
.conn-item .conn-icon { color: var(--fg-mute); font-size: 10px; }
.conn-item .conn-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.conn-item .conn-name { flex: 1; overflow: hidden; text-overflow: ellipsis; color: rgba(230,237,243,0.55); }
.conn-item:hover .conn-name { color: rgba(230,237,243,0.8); }
.conn-item .conn-label { color: rgba(230,237,243,0.1); font-size: 10px; flex-shrink: 0; }

.source { font-family: "JetBrains Mono", Consolas, monospace; font-size: 11px; background: var(--bg-elev); padding: 8px; border-radius: 6px; overflow-x: auto; margin-top: 8px; }
.source .src-line { display: flex; }
.source .src-line.hl { background: rgba(29,162,126,0.2); }
.source .src-ln { color: var(--fg-mute); user-select: none; padding-right: 12px; text-align: right; min-width: 40px; }
.source .src-code { white-space: pre; }
.src-meta { font-size: 10px; color: var(--fg-mute); margin-bottom: 4px; }
.src-loading { font-size: 11px; color: var(--fg-mute); padding: 8px; }
.src-error { color: var(--danger); font-size: 11px; padding: 8px; }

/* Display settings menu */
#display-menu {
  position: absolute; top: 48px; right: 16px; z-index: 25; display: none;
  background: rgba(11,25,32,0.95); backdrop-filter: blur(12px);
  border: 1px solid var(--border-soft); border-radius: 10px;
  padding: 16px; width: 260px;
  box-shadow: 0 12px 32px rgba(0,0,0,0.5);
}
#display-menu.active { display: block; }
.dm-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.dm-title { font-size: 11px; font-weight: 500; color: var(--fg-mute); text-transform: uppercase; letter-spacing: 0.1em; }
.dm-reset { font-size: 10px; color: rgba(29,162,126,0.7); background: transparent; border: none; }
.dm-reset:hover { color: var(--primary); }
.dm-row { margin-bottom: 12px; }
.dm-row-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.dm-row-label span:first-child { font-size: 11px; color: var(--fg-dim); }
.dm-row-val { font-size: 10px; color: rgba(103,232,249,0.7); font-family: "JetBrains Mono", Consolas, monospace; }
.dm-row input[type=range] { width: 100%; accent-color: var(--cyan); }
.dm-row .dm-hint { font-size: 9px; color: var(--fg-mute); margin-top: 2px; }
.dm-footer {
  font-size: 9px; color: var(--fg-mute); padding-top: 8px;
  border-top: 1px solid var(--border-soft); margin-top: 8px;
}

/* Scrollbar */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }
</style>
</head>
<body>

<!-- Header -->
<header id="header">
  <div class="brand">
    <span class="brand-dot"></span>
    <span class="brand-text">shaderbase 图谱</span>
  </div>
  <div class="project-pill">
    <span class="label">project</span>
    <span class="name">g66</span>
  </div>
  <div class="spacer"></div>
  <div class="actions">
    <div class="budget-wrap">
      <label for="budget-input">nodes</label>
      <input type="number" id="budget-input" value="5000" step="5000" min="5000" max="10000000"
             title="加载的节点数上限（每 5000 一档，边自动跟随）">
    </div>
    <button class="hdr-btn" id="btn-clear-sel" onclick="clearSelection()" style="display:none;">清除选择</button>
    <button class="hdr-btn" onclick="toggleDisplayMenu()">
      显示<span id="display-dot" style="display:none;color:var(--cyan);margin-left:4px;">•</span>
    </button>
    <button class="hdr-btn primary" onclick="fetchGraph()">刷新</button>
  </div>
</header>

<!-- Main 3-column -->
<div id="main">
  <!-- Left panel -->
  <div id="left-panel">
    <div class="lp-section">
      <div class="lp-section-title">
        <span>节点类型</span>
        <div class="lp-actions">
          <a onclick="enableAllFilters()">全选</a>
          <span class="sep">|</span>
          <a onclick="disableAllFilters()">全无</a>
        </div>
      </div>
      <div id="kind-filters" style="display:flex;flex-wrap:wrap;gap:2px;"></div>
    </div>

    <div class="lp-section">
      <div class="lp-section-title"><span>边类型</span></div>
      <div id="edge-filters" style="display:flex;flex-wrap:wrap;gap:2px;"></div>
    </div>

    <div class="dead-section">
      <div class="row">
        <span class="row-label">Dead code</span>
        <span class="row-val" id="dead-count">0 dead</span>
      </div>
      <label class="check-row" id="cr-dead-view">
        <span class="check-box"></span>
        <input type="checkbox" id="toggle-dead-view" style="display:none;">
        按状态着色
      </label>
      <label class="check-row" id="cr-only-dead">
        <span class="check-box"></span>
        <input type="checkbox" id="toggle-only-dead" style="display:none;">
        只显示死代码
      </label>
      <label class="check-row" id="cr-hide-entry">
        <span class="check-box"></span>
        <input type="checkbox" id="toggle-hide-entry" style="display:none;">
        隐藏入口点
      </label>
      <label class="check-row" id="cr-hide-tests">
        <span class="check-box"></span>
        <input type="checkbox" id="toggle-hide-tests" style="display:none;">
        隐藏测试
      </label>
      <div class="legend-row" id="status-legend" style="display:none;"></div>
    </div>

    <div class="display-options">
      <label class="check-row" id="cr-show-labels">
        <span class="check-box"></span>
        <input type="checkbox" id="toggle-show-labels" checked style="display:none;">
        显示标签
      </label>
    </div>

    <div class="file-tree-wrap" style="display:flex;flex-direction:column;flex:1;min-height:0;">
      <div class="lp-section-title"><span>文件目录</span></div>
      <input type="text" id="search-input" class="search-box" placeholder="搜索节点名或路径...">
      <div id="file-tree"></div>
      <div class="clear-sel-wrap" id="clear-sel-wrap" style="display:none;">
        <button class="clear-sel-btn" onclick="clearSelection()">清除选择</button>
      </div>
    </div>
  </div>

  <div class="resize-handle" id="resize-left"></div>

  <!-- Center canvas -->
  <div id="center">
    <div id="canvas-container"></div>
    <div id="hud">
      <p id="hud-main"></p>
      <p class="hud-filtered" id="hud-filtered"></p>
      <p class="hud-notice" id="hud-notice"></p>
      <p class="hud-sel" id="hud-selected"></p>
    </div>
    <div id="display-menu">
      <div class="dm-header">
        <span class="dm-title">显示设置</span>
        <button class="dm-reset" onclick="resetDisplay()">重置</button>
      </div>
      <div class="dm-row">
        <div class="dm-row-label"><span>边亮度</span><span class="dm-row-val" id="val-edge">1.00×</span></div>
        <input type="range" id="slider-edge" min="0.1" max="3" step="0.05" value="1.0">
        <div class="dm-hint">密集图的连线变暗</div>
      </div>
      <div class="dm-row">
        <div class="dm-row-label"><span>节点辉光</span><span class="dm-row-val" id="val-glow">1.00×</span></div>
        <input type="range" id="slider-glow" min="0" max="2" step="0.05" value="1.0">
        <div class="dm-hint">每个节点周围的 halo 增强</div>
      </div>
      <div class="dm-row">
        <div class="dm-row-label"><span>Bloom</span><span class="dm-row-val" id="val-bloom">1.00×</span></div>
        <input type="range" id="slider-bloom" min="0" max="2" step="0.05" value="1.0">
        <div class="dm-hint">整体辉光强度</div>
      </div>
      <div class="dm-footer">1.00× 跟随自动密度补偿。大图变白时降低边/辉光/bloom 值。</div>
    </div>
    <div id="loading">
      <svg class="loader-svg" width="120" height="104" viewBox="0 0 120 104">
        <line class="loader-edge" x1="60" y1="18" x2="60" y2="52"/>
        <line class="loader-edge" x1="22" y1="42" x2="60" y2="52"/>
        <line class="loader-edge" x1="98" y1="40" x2="60" y2="52"/>
        <line class="loader-edge" x1="42" y1="78" x2="60" y2="52"/>
        <line class="loader-edge" x1="84" y1="82" x2="60" y2="52"/>
        <circle class="loader-node" cx="60" cy="18" r="5"/>
        <circle class="loader-node" cx="22" cy="42" r="4"/>
        <circle class="loader-node" cx="98" cy="40" r="4"/>
        <circle class="loader-node" cx="42" cy="78" r="4.5"/>
        <circle class="loader-node" cx="84" cy="82" r="3.5"/>
        <circle class="loader-node" cx="60" cy="52" r="6"/>
      </svg>
      <p class="loading-text">计算布局中 — 最多 <span id="loader-budget">5000</span> 节点</p>
      <p class="loading-sub"></p>
    </div>
    <div id="load-error"></div>
  </div>

  <div class="resize-handle" id="resize-right"></div>

  <!-- Right detail panel -->
  <div id="right-panel">
    <div id="detail-header"></div>
    <div id="detail-body"></div>
  </div>
</div>

<!-- Tooltip -->
<div id="tooltip"></div>

<!-- ES module importmap: three + addons -->
<script type="importmap">
{
  "imports": {
    "three": "/static/three.module.js",
    "three/addons/": "/static/"
  }
}
</script>
<script type="module" src="/static/app.js"></script>
</body>
</html>
